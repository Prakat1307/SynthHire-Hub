events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # NOTE: NO CORS headers here! Each backend service handles CORS via FastAPI middleware.
        # Adding CORS headers in Nginx would cause duplicate headers (*, *) which browsers reject.

        # ──── Auth Routes ────
        location /auth/ {
            set $auth http://auth-service:8001;
            proxy_pass $auth$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/auth/ {
            set $auth http://auth-service:8001;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── User Routes ────
        location /api/users/ {
            set $user http://user-service:8002;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Session Orchestrator ────
        location /api/sessions {
            set $session http://session-orchestrator:8003;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $session;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/templates {
            set $session http://session-orchestrator:8003;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $session;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Speech Pipeline ────
        location /api/speech/ {
            set $speech http://speech-pipeline:8004;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $speech;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Code Executor ────
        location /api/code/ {
            set $code http://code-executor:8005;
            rewrite ^/api/code/(.*)$ /run/$1 break;
            proxy_pass $code;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Assessment Engine ────
        location /api/assessment/ {
            set $assess http://assessment-engine:8006;
            rewrite ^/api/assessment/(.*)$ /assess/$1 break;
            proxy_pass $assess;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Emotion Analysis ────
        location /api/emotion/ {
            set $emotion http://emotion-analysis:8007;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $emotion;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Report Generator ────
        location /api/report/ {
            set $report http://report-generator:8009;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $report;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Analytics Service ────
        location /api/analytics/ {
            set $analytics http://analytics-service:8010;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Certification Service ────
        location /api/certificates {
            set $cert http://certification-service:8011;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $cert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/verify/ {
            set $cert http://certification-service:8011;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $cert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Public verification route (no /api prefix)
        location /verify/ {
            set $cert http://certification-service:8011;
            proxy_pass $cert$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Learning Service ────
        location /api/learning/ {
            set $learn http://learning-service:8012;
            rewrite ^/api/learning/(.*)$ /$1 break;
            proxy_pass $learn;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Company Service ────
        location /api/company/ {
            set $company http://company-service:8013;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass $company;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Shortlisting Service ────
        location /api/shortlist/ {
            set $shortlist http://shortlisting-service:8014;
            rewrite ^/api/shortlist/(.*)$ /$1 break;
            proxy_pass $shortlist;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Matching Service ────
        location /api/matching/ {
            set $matching http://matching-service:8015;
            rewrite ^/api/matching/(.*)$ /$1 break;
            proxy_pass $matching;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── V3: Job Service ────
        location /api/jobs/ {
            set $job http://job-service:8016;
            rewrite ^/api/jobs/(.*)$ /$1 break;
            proxy_pass $job;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── Clean Service Proxies for getServiceUrl() ────
        location /api/services/session/ {
            set $session http://session-orchestrator:8003;
            rewrite ^/api/services/session/(.*)$ /$1 break;
            proxy_pass $session;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/analytics/ {
            set $analytics http://analytics-service:8010;
            rewrite ^/api/services/analytics/(.*)$ /$1 break;
            proxy_pass $analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/report/ {
            set $report http://report-generator:8009;
            rewrite ^/api/services/report/(.*)$ /$1 break;
            proxy_pass $report;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/emotion/ {
            set $emotion http://emotion-analysis:8007;
            rewrite ^/api/services/emotion/(.*)$ /$1 break;
            proxy_pass $emotion;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/assessment/ {
            set $assess http://assessment-engine:8006;
            rewrite ^/api/services/assessment/(.*)$ /$1 break;
            proxy_pass $assess;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/code/ {
            set $code http://code-executor:8005;
            rewrite ^/api/services/code/(.*)$ /$1 break;
            proxy_pass $code;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/speech/ {
            set $speech http://speech-pipeline:8004;
            rewrite ^/api/services/speech/(.*)$ /$1 break;
            proxy_pass $speech;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/user/ {
            set $user http://user-service:8002;
            rewrite ^/api/services/user/(.*)$ /$1 break;
            proxy_pass $user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/auth/ {
            set $auth http://auth-service:8001;
            rewrite ^/api/services/auth/(.*)$ /$1 break;
            proxy_pass $auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/certification/ {
            set $cert http://certification-service:8011;
            rewrite ^/api/services/certification/(.*)$ /$1 break;
            proxy_pass $cert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/learning/ {
            set $learn http://learning-service:8012;
            rewrite ^/api/services/learning/(.*)$ /$1 break;
            proxy_pass $learn;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/company/ {
            set $company http://company-service:8013;
            rewrite ^/api/services/company/(.*)$ /$1 break;
            proxy_pass $company;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/shortlisting/ {
            set $shortlist http://shortlisting-service:8014;
            rewrite ^/api/services/shortlisting/(.*)$ /$1 break;
            proxy_pass $shortlist;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/matching/ {
            set $matching http://matching-service:8015;
            rewrite ^/api/services/matching/(.*)$ /$1 break;
            proxy_pass $matching;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/job/ {
            set $job http://job-service:8016;
            rewrite ^/api/services/job/(.*)$ /$1 break;
            proxy_pass $job;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/services/onboarding/ {
            set $onboarding http://onboarding-service:8017;
            rewrite ^/api/services/onboarding/(.*)$ /$1 break;
            proxy_pass $onboarding;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/services/resume/ {
            set $resume http://resume-service:8018;
            rewrite ^/api/services/resume/(.*)$ /$1 break;
            proxy_pass $resume;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ──── WebSocket for sessions ────
        location /ws/ {
            set $session http://session-orchestrator:8003;
            rewrite ^/ws(/.*)$ $1 break;
            proxy_pass $session;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ──── Health Check ────
        location = /health {
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # ──── Frontend (catch-all) ────
        location / {
            set $frontend http://frontend:3000;
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
