services:
  postgres:
    image: postgres:15-alpine
    container_name: synthhire-postgres
    environment:
      POSTGRES_USER: synthhire
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: synthhire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synthhire" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synthhire-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: synthhire-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: synthhire
      MONGO_INITDB_ROOT_PASSWORD: localdev123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: synthhire-auth
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  user-service:
    build:
      context: ..
      dockerfile: backend/services/user-service/Dockerfile
    container_name: synthhire-user
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  session-orchestrator:
    build:
      context: ..
      dockerfile: backend/services/session-orchestrator/Dockerfile
    container_name: synthhire-session
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://synthhire:localdev123@mongodb:27017/synthhire?authSource=admin
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  speech-pipeline:
    build:
      context: ..
      dockerfile: backend/services/speech-pipeline/Dockerfile
    container_name: synthhire-speech
    ports:
      - "8004:8004"
    env_file:
      - .env
    restart: unless-stopped

  code-executor:
    build:
      context: ..
      dockerfile: backend/services/code-executor/Dockerfile
    container_name: synthhire-code-executor
    ports:
      - "8005:8005"
    env_file:
      - .env
    restart: unless-stopped

  assessment-engine:
    build:
      context: ..
      dockerfile: backend/services/assessment-engine/Dockerfile
    container_name: synthhire-assessment
    ports:
      - "8006:8006"
    env_file:
      - .env
    volumes:
      - ../ml:/app/ml
    restart: unless-stopped

  analytics-service:
    build:
      context: ..
      dockerfile: backend/services/analytics-service/Dockerfile
    container_name: synthhire-analytics
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  report-generator:
    build:
      context: ..
      dockerfile: backend/services/report-generator/Dockerfile
    container_name: synthhire-report-generator
    ports:
      - "8009:8009"
    env_file:
      - .env
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  emotion-analysis:
    build:
      context: ..
      dockerfile: backend/services/emotion-analysis/Dockerfile
    container_name: synthhire-emotion
    ports:
      - "8007:8007"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8888
    container_name: synthhire-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8888
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      auth-service:
        condition: service_healthy
      session-orchestrator:
        condition: service_healthy
    restart: unless-stopped

  certification-service:
    build:
      context: ..
      dockerfile: backend/services/certification-service/Dockerfile
    container_name: synthhire-certification
    ports:
      - "8011:8011"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  learning-service:
    build:
      context: ..
      dockerfile: backend/services/learning-service/Dockerfile
    container_name: synthhire-learning
    ports:
      - "8012:8012"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  company-service:
    build:
      context: ..
      dockerfile: backend/services/company-service/Dockerfile
    container_name: synthhire-company
    ports:
      - "8013:8013"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  shortlisting-service:
    build:
      context: ..
      dockerfile: backend/services/shortlisting-service/Dockerfile
    container_name: synthhire-shortlisting
    ports:
      - "8014:8014"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  matching-service:
    build:
      context: ..
      dockerfile: backend/services/matching-service/Dockerfile
    container_name: synthhire-matching
    ports:
      - "8015:8015"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  job-service:
    build:
      context: ..
      dockerfile: backend/services/job-service/Dockerfile
    container_name: synthhire-job
    ports:
      - "8016:8016"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
      - MATCHING_SERVICE_URL=http://matching-service:8015
    volumes:
      - ./services/job-service/app:/app/app
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  onboarding-service:
    build:
      context: ..
      dockerfile: backend/services/onboarding-service/Dockerfile
    container_name: synthhire-onboarding
    ports:
      - "8017:8017"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  resume-service:
    build:
      context: ..
      dockerfile: backend/services/resume-service/Dockerfile
    container_name: synthhire-resume
    ports:
      - "8018:8018"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://synthhire:localdev123@postgres:5432/synthhire
    volumes:
      - ./shared:/app/backend/shared
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: synthhire-nginx
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - session-orchestrator
      - speech-pipeline
      - code-executor
      - assessment-engine
      - emotion-analysis
      - report-generator
      - analytics-service
      - certification-service
      - learning-service
      - company-service
      - shortlisting-service
      - matching-service
      - job-service
      - onboarding-service
      - resume-service
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
